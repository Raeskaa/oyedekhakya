<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>oyedekhakya — hackathons &amp; startup credits</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #666;
    --card: #f5f5f7;
    --border: #e2e2e6;
    --accent: #2f5dff;
    --deadline-bg: #fff4e5;
    --deadline-border: #f0b429;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121214;
      --fg: #ededef;
      --muted: #9a9aa2;
      --card: #1c1c20;
      --border: #2c2c31;
      --accent: #7c9dff;
      --deadline-bg: #2a2210;
      --deadline-border: #a97b12;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }
  main { max-width: 840px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
  header { margin-bottom: 2rem; }
  h1 { font-size: 1.6rem; margin: 0 0 0.25rem; }
  .updated { color: var(--muted); font-size: 0.85rem; }
  h2 { font-size: 1.1rem; margin: 2.5rem 0 0.5rem; padding-bottom: 0.35rem; border-bottom: 1px solid var(--border); }
  h3 { font-size: 0.95rem; color: var(--muted); margin: 1.25rem 0 0.5rem; text-transform: uppercase; letter-spacing: 0.03em; }
  ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 0.5rem; }
  li.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
  }
  li.card a { color: var(--fg); text-decoration: none; font-weight: 600; }
  li.card a:hover { color: var(--accent); }
  li.card .note { color: var(--muted); font-size: 0.88rem; margin-top: 0.15rem; }
  .deadlines { display: grid; gap: 0.5rem; }
  .deadline {
    background: var(--deadline-bg);
    border: 1px solid var(--deadline-border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
  }
  .deadline .date { font-weight: 700; }
  .empty { color: var(--muted); font-size: 0.9rem; }
  footer { margin-top: 3rem; color: var(--muted); font-size: 0.8rem; }
</style>
</head>
<body>
<main>
  <header>
    <h1>🚀 oyedekhakya</h1>
    <div class="updated" id="updated">loading…</div>
  </header>

  <section>
    <h2>⏰ Deadlines to watch</h2>
    <div class="deadlines" id="deadlines"></div>
  </section>

  <section>
    <h2>🏆 Hackathons</h2>
    <h3>AI / ML</h3>
    <ul id="hack-ai"></ul>
    <h3>General tech</h3>
    <ul id="hack-general"></ul>
  </section>

  <section>
    <h2>💰 Startup credits &amp; compute</h2>
    <h3>AI API credits</h3>
    <ul id="credits-ai"></ul>
    <h3>Cloud infra credits</h3>
    <ul id="credits-cloud"></ul>
  </section>

  <section>
    <h2>🎯 Accelerators / incubators</h2>
    <ul id="accelerators"></ul>
  </section>

  <footer>Refreshed automatically every morning. Source data: <a href="data.json">data.json</a>.</footer>
</main>

<script>
function daysUntil(dateStr) {
  const today = new Date(new Date().toDateString());
  const target = new Date(dateStr);
  return Math.round((target - today) / 86400000);
}

function card(item) {
  const li = document.createElement('li');
  li.className = 'card';
  const a = document.createElement('a');
  a.href = item.url; a.textContent = item.title; a.target = '_blank'; a.rel = 'noopener';
  li.appendChild(a);
  if (item.note) {
    const note = document.createElement('div');
    note.className = 'note';
    note.textContent = item.note;
    li.appendChild(note);
  }
  return li;
}

function renderList(id, items) {
  const ul = document.getElementById(id);
  ul.innerHTML = '';
  if (!items || !items.length) {
    const li = document.createElement('li');
    li.className = 'empty';
    li.textContent = 'Nothing listed right now.';
    ul.appendChild(li);
    return;
  }
  items.forEach(item => ul.appendChild(card(item)));
}

fetch('data.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    document.getElementById('updated').textContent = 'Last updated ' + data.updated_at;

    const deadlinesEl = document.getElementById('deadlines');
    deadlinesEl.innerHTML = '';
    (data.deadlines || []).forEach(d => {
      const div = document.createElement('div');
      div.className = 'deadline';
      const days = daysUntil(d.date);
      const daysLabel = days < 0 ? 'past' : days === 0 ? 'today' : days + 'd left';
      div.innerHTML = '<span class="date">' + d.date + ' · ' + daysLabel + '</span> — <a href="' + d.url + '" target="_blank" rel="noopener">' + d.title + '</a>' + (d.note ? '<div class="note">' + d.note + '</div>' : '');
      deadlinesEl.appendChild(div);
    });

    renderList('hack-ai', data.hackathons && data.hackathons.ai_ml);
    renderList('hack-general', data.hackathons && data.hackathons.general);
    renderList('credits-ai', data.credits && data.credits.ai_api);
    renderList('credits-cloud', data.credits && data.credits.cloud_infra);
    renderList('accelerators', data.accelerators);
  })
  .catch(err => {
    document.getElementById('updated').textContent = 'Failed to load data.json';
    console.error(err);
  });
</script>
</body>
</html>
