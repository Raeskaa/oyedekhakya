<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>oyedekhakya — hackathons &amp; startup credits</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9A%80%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <span style="font-size:1.3rem">🚀</span>
      <span class="brand-title">oyedekhakya</span>
    </div>

    <nav>
      <div class="nav-section">
        <button class="nav-item active" data-view="overview">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          Overview
        </button>
        <button class="nav-item" data-view="table">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M3 14h18M9 4v16"/></svg>
          Table
        </button>
        <button class="nav-item" data-view="cards">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
          Cards
        </button>
      </div>

      <div class="nav-label">Categories</div>
      <div class="nav-section" id="category-nav"></div>
    </nav>

    <div class="sidebar-footer">
      <div class="theme-toggle">
        <span id="theme-label">Dark mode</span>
        <button class="switch" id="theme-switch" aria-label="Toggle dark mode"></button>
      </div>
      <div class="updated-label" id="updated-label">Loading…</div>
    </div>
  </aside>

  <main>
    <header class="page-header">
      <h1 id="page-title">Overview</h1>
    </header>

    <section class="stat-row" id="stat-row"></section>

    <section id="view-overview">
      <div class="section-title">⏰ Deadlines within 45 days</div>
      <div class="deadline-list" id="deadline-list"></div>
    </section>

    <section id="view-table" hidden>
      <div class="filter-bar">
        <div class="pill-group" id="filter-category"></div>
        <div class="pill-group" id="filter-status"></div>
        <input class="search-input" id="search-table" type="text" placeholder="Search…">
        <span class="result-count" id="count-table"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-sort="title">Title</th>
              <th data-sort="category">Category</th>
              <th data-sort="subcategory">Type</th>
              <th data-sort="date">Date</th>
              <th data-sort="status">Status</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </section>

    <section id="view-cards" hidden>
      <div class="filter-bar">
        <div class="pill-group" id="filter-category-2"></div>
        <div class="pill-group" id="filter-status-2"></div>
        <input class="search-input" id="search-cards" type="text" placeholder="Search…">
        <span class="result-count" id="count-cards"></span>
      </div>
      <div id="cards-container"></div>
    </section>

    <footer class="site-footer">Source data: <a href="data.json">data.json</a>. Refreshed automatically every morning.</footer>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
